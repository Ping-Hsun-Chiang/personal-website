<header class="header">
  <nav class="nav">
    <div class="logo">
      {{- $label_text := (site.Params.label.text | default site.Title) }}
      {{- if site.Title }}
      <a href="{{ "" | absLangURL }}" accesskey="h" title="{{ $label_text }} (Alt + H)">
        {{- if site.Params.label.icon }}
        {{- $img := resources.Get site.Params.label.icon }}
        {{- if $img }}
          {{- $img = $img.Process "resize 30x" }}
          <img src="{{ $img.Permalink }}" alt="" aria-hidden="true">
        {{- end }}
        {{- end }}
        <span>{{ $label_text }}</span>
      </a>
      {{- end }}
    </div>

    <div class="hamburger-menu">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="開啟選單" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

<aside class="sidebar-drawer" id="sidebarDrawer" role="dialog" aria-modal="true" aria-label="導覽選單">
  <div class="sidebar-header">
    <button class="sidebar-close" id="sidebarClose" aria-label="關閉選單">&#x2715;</button>
  </div>
  <nav class="sidebar-nav">
    <a href="{{ "posts/" | absURL }}" class="sidebar-item">
      <span class="sidebar-icon">&#x1F4DD;</span>&#x6587;&#x7AE0;
    </a>
    <a href="{{ "interviews/" | absURL }}" class="sidebar-item">
      <span class="sidebar-icon">&#x1F512;</span>&#x9762;&#x8A66;&#x7D93;&#x6B77;
    </a>
  </nav>
</aside>

<script>
(function () {
  var btn     = document.getElementById('hamburgerBtn');
  var overlay = document.getElementById('sidebarOverlay');
  var drawer  = document.getElementById('sidebarDrawer');

  function openSidebar() {
    drawer.classList.add('open');
    overlay.classList.add('open');
    btn.classList.add('active');
    btn.setAttribute('aria-expanded', 'true');
    document.body.classList.add('sidebar-open');
  }

  function closeSidebar() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    btn.classList.remove('active');
    btn.setAttribute('aria-expanded', 'false');
    document.body.classList.remove('sidebar-open');
  }

  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    drawer.classList.contains('open') ? closeSidebar() : openSidebar();
  });

  overlay.addEventListener('click', closeSidebar);
  document.getElementById('sidebarClose').addEventListener('click', closeSidebar);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSidebar();
  });
})();
</script>

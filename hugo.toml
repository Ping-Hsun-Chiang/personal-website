我是國立東華大學統計碩士畢業生，對探索數據背後的隱藏規律充滿熱忱。我的專業揉合了嚴謹的統計分析思維與現代深度學習技術。

在學期間，我不僅深入研究空間統計與深度學習，更具備將理論落地的實戰經驗；亦曾主導花東運輸數據分析計畫，透過統計分析技術提供決策支援。

我熟悉 Python 工具與 TensorFlow 等深度學習框架，能夠獨立完成從數據清洗、模型建構、統計檢定到資料視覺化的完整開發流程。我期待能將自身的統計直覺與工程實作能力，貢獻於極具挑戰性的數據科學與分析領域。
'''



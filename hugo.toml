about = '''
國立東華大學統計碩士，專注於 **AI 模型設計與落地實作**。碩士期間提出 Spherical DeepKriging 空間預測架構，結合深度神經網路與球面基底函數，在全球尺度大數據場景下預測效能顯著超越傳統克利金模型。

具備完整的 AI 工程實作能力：以 TensorFlow/Keras 建置多標籤分類模型並實施滾動式回測驗證；開發 Python 自動化機器人整合 Meta Graph API，串接 Facebook、Instagram、Threads 三平台跨平台發文與自動回覆功能；獨立完成全端網頁建置，後端串接 Google Apps Script 實現表單資料收集與 Email 通知系統。

熟悉從**資料清理 → 模型訓練 → 驗證評估 → 自動化部署**的完整開發流程，習慣在 Linux (WSL) 環境下進行工程開發。擅長將統計嚴謹度帶入機器學習實作，追求可解釋、可驗證的模型結果。
'''


